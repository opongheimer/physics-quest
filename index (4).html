const allMCQ=[{type:'mcq',text:'Which best explains why EM waves travel through vacuum but sound waves cannot?',options:['EM waves need air molecules','EM waves self-propagate through oscillating electric and magnetic fields requiring no medium','Sound has higher energy in vacuum','EM waves travel slower needing less energy'],answer:1},{type:'mcq',text:'A medium has permittivity ε and permeability μ. Which gives the speed of an EM wave through it?',options:['v = ε×μ','v = 1/√(εμ)','v = √(ε/μ)','v = c/(ε+μ)'],answer:1},{type:'mcq',text:'As EM wave frequency increases in vacuum, what correctly occurs?',options:['Speed increases, wavelength constant','Speed decreases, wavelength increases','Wavelength decreases while speed remains constant','Both speed and wavelength increase'],answer:2},{type:'mcq',text:'Which EM wave type is most responsible for the greenhouse effect?',options:['Radio waves from ground','Infrared radiation re-emitted by Earth surface','UV absorbed by ozone','Microwaves from towers'],answer:1},{type:'mcq',text:'Light travels from water (n=1.33) into glass (n=1.52). What happens at the boundary?',options:['Bends away from normal — enters less dense medium','Bends toward normal — enters more optically dense medium','Continues straight — both media transparent','Total internal reflection — glass is denser'],answer:1},{type:'mcq',text:'Zayed-Bot laser in glass (n=1.52) hits glass-air boundary at 45°. Critical angle ~41.1°. What occurs?',options:['Refracts into air at large angle','Partially refracts and reflects','Total internal reflection — all light reflects back into glass','Light absorbed at boundary'],answer:2},{type:'mcq',text:'Light from air (n=1.00) into glass (n=1.50) at 30° incidence. Angle of refraction?',options:['45.0°','19.5°','30.0°','48.6°'],answer:1},{type:'mcq',text:'In dispersion, violet bends more than red through a prism because:',options:['Violet travels faster in glass','Violet has shorter wavelength causing higher refractive index in glass','Red has higher frequency bending toward base','Both bend equally'],answer:1},{type:'mcq',text:'Which TWO conditions are required for Total Internal Reflection?',options:['Less to more dense medium, angle exceeds 90°','More to less dense medium, angle equals or exceeds critical angle','Both media transparent, light parallel to boundary','Frequency matches natural frequency of second medium'],answer:1},{type:'mcq',text:'Diamond refractive index is 2.42. Speed of light inside? (c=3×10⁸ m/s)',options:['7.26×10⁸ m/s','1.24×10⁸ m/s','2.42×10⁸ m/s','3.00×10⁸ m/s'],answer:1},{type:'mcq',text:'Fiber optic cables transmit data at near light-speed using which phenomenon?',options:['Diffraction at cable joints','Dispersion spreading signal','Total Internal Reflection keeping light inside glass core','Photoelectric effect'],answer:2},{type:'mcq',text:'Hard reflection (180° phase shift) occurs when:',options:['Light moves denser to rarer medium','Light moves rarer to denser medium','Angle of incidence equals critical angle','Surface is diffuse'],answer:1},{type:'mcq',text:'Angles in the Law of Reflection are measured from:',options:['The reflecting surface','The normal perpendicular to surface at point of contact','The horizontal ground','Direction of original light source'],answer:1},{type:'mcq',text:'Which sequence correctly explains mirage formation?',options:['Road heats air, cold near ground, light refracts down, image below horizon','Road heats air, hot less-dense air near ground, Snells Law bends light, TIR curves sky light upward, eye sees inverted sky as water','UV heats road, gamma rays scatter, visible light diffracts','Convection bends light mechanically without refraction'],answer:1},{type:'mcq',text:'Zayed-Bot glass fiber (n=1.52) contacts water (n=1.33). Critical angle for glass-water?',options:['41.1°','48.6°','61.1°','28.9°'],answer:2}];
const allTF=[{type:'tf',text:'Electromagnetic waves require a physical medium to propagate and cannot travel through space vacuum.',answer:'False'},{type:'tf',text:'The speed of all EM waves in vacuum is approximately 3×10⁸ m/s regardless of frequency or wavelength.',answer:'True'},{type:'tf',text:'The angle of incidence always equals angle of reflection, both measured from the normal to the surface.',answer:'True'},{type:'tf',text:'When light travels from glass (n=1.5) to air (n=1.0), Total Internal Reflection occurs at ANY angle of incidence.',answer:'False'},{type:'tf',text:'Total Internal Reflection can occur when light moves from a less dense medium like air into a more dense medium like glass.',answer:'False'},{type:'tf',text:"Snell's Law is expressed as n₁sinθ₁ = n₂sinθ₂ where n₁ and n₂ are the refractive indices of the two media.",answer:'True'},{type:'tf',text:'In dispersion through a prism, red light bends more than violet because red has a higher refractive index in glass.',answer:'False'},{type:'tf',text:'Refractive index of a medium is the ratio of the speed of light in that medium to its speed in vacuum.',answer:'False'},{type:'tf',text:'Infrared radiation re-emitted by Earth plays a key role in the greenhouse effect because greenhouse gases absorb and trap it.',answer:'True'},{type:'tf',text:'Diffuse reflection occurs when light strikes a smooth polished surface and all reflected rays emerge perfectly parallel.',answer:'False'},{type:'tf',text:'When light passes from air into water it slows down and the refracted ray bends toward the normal.',answer:'True'},{type:'tf',text:'Ultraviolet radiation has a longer wavelength than visible light making it more energetic and able to cause skin damage.',answer:'False'},{type:'tf',text:'The critical angle for a glass-water interface is larger than for a glass-air interface because water has a higher refractive index than air.',answer:'True'},{type:'tf',text:'For fiber optic cables the angle of incidence of light hitting the core-cladding boundary must be LESS than the critical angle.',answer:'False'},{type:'tf',text:'In specular reflection the incident ray, reflected ray, and normal at point of incidence all lie in the same two-dimensional plane.',answer:'True'}];
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildQuestions(){return shuffle([...shuffle(allMCQ).slice(0,15),...shuffle(allTF).slice(0,15)]);}
function go(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function checkTeacherCode(){if(document.getElementById('teacherCode').value==='physics2025'){loadDashboard();go('screen-teacher');}else{alert('Incorrect access code.');}}
function loadDashboard(){students=JSON.parse(localStorage.getItem('pq_students')||'[]');renderDashboard(students);}
function renderDashboard(data){
  const t=data.length,avg=t?(data.reduce((a,s)=>a+s.score,0)/t/30*100).toFixed(1)+'%':'—',passed=data.filter(s=>(s.score/30)>=.5).length,viols=JSON.parse(localStorage.getItem('pq_students')||'[]').reduce((a,s)=>a+(s.violations?s.violations.length:0),0);
  document.getElementById('statTotal').textContent=t;document.getElementById('statAvg').textContent=avg;document.getElementById('statPass').textContent=passed;document.getElementById('statFail').textContent=t-passed;document.getElementById('statViol').textContent=viols;
  const tb=document.getElementById('studBody');
  if(!t){tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:40px;">No submissions yet.</td></tr>';return;}
  tb.innerHTML=data.map((s,i)=>{const p=Math.round(s.score/30*100),v=s.violations?s.violations.length:0;return\`<tr><td style="color:var(--muted)">\${i+1}</td><td style="font-weight:700">\${escHtml(s.name)}</td><td><span class="badge badge-teal">\${s.section}</span></td><td style="color:var(--muted);font-size:13px">\${escHtml(s.email)}</td><td><strong style="color:var(--gold)">\${s.score}/30</strong></td><td>\${p}%</td><td style="color:var(--muted)">\${s.timeTaken||'—'}</td><td><span class="badge \${v>3?'badge-red':v>0?'badge-gold':'badge-teal'}">\${v}</span></td><td><span class="badge \${p>=50?'badge-green':'badge-red'}">\${p>=50?'Passed':'Failed'}</span></td></tr>\`;}).join('');
}
function filterSection(sec,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const all=JSON.parse(localStorage.getItem('pq_students')||'[]');renderDashboard(sec==='all'?all:all.filter(s=>s.section===sec));}
function downloadCSV(){const all=JSON.parse(localStorage.getItem('pq_students')||'[]');if(!all.length){alert('No data yet.');return;}let csv='No,Name,Section,Email,Score,Percent,Time,Violations,Status,Submitted,ViolationLog\n';all.forEach((s,i)=>{const p=Math.round(s.score/30*100);csv+=\`"\${i+1}","\${s.name}","\${s.section}","\${s.email}","\${s.score}/30","\${p}%","\${s.timeTaken||'—'}","\${s.violations?s.violations.length:0}","\${p>=50?'Passed':'Failed'}","\${s.finishTime||''}","\${s.violations?s.violations.join(' | '):'None'}"\n\`;});const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='PhysicsQuest_Report_'+new Date().toISOString().slice(0,10)+'.csv';a.click();}
function clearData(){if(confirm('Delete ALL student data? Cannot be undone.')){localStorage.removeItem('pq_students');students=[];loadDashboard();}}
function startQuest(){const name=document.getElementById('sName').value.trim(),section=document.getElementById('sSection').value,email=document.getElementById('sEmail').value.trim();if(!name){alert('Enter your full name.');return;}if(!section){alert('Select your section.');return;}if(!email||!email.includes('@')){alert('Enter valid email.');return;}currentStudent={name,section,email,startTime:new Date().toISOString(),violations:[],score:0};violations=[];score=0;currentQIndex=0;answered=false;currentQuestions=buildQuestions();secondsLeft=1800;quizStartTime=Date.now();document.getElementById('violBadge').textContent='0';document.getElementById('feedbackBar').classList.remove('show');go('screen-quiz');renderQuestion();startTimer();startAntiCheat();}
function startTimer(){clearInterval(timerInterval);timerInterval=setInterval(()=>{secondsLeft--;const m=Math.floor(secondsLeft/60),s=secondsLeft%60,td=document.getElementById('timerDisplay');td.textContent=m+':'+(s<10?'0'+s:s);if(secondsLeft<=300)td.classList.add('urgent');else td.classList.remove('urgent');if(secondsLeft<=0){clearInterval(timerInterval);finishQuest();}},1000);}
function renderQuestion(){answered=false;document.getElementById('nextBtn').disabled=true;document.getElementById('feedbackBar').classList.remove('show');const q=currentQuestions[currentQIndex],total=currentQuestions.length;document.getElementById('qCounter').textContent=(currentQIndex+1)+' / '+total;document.getElementById('qNum').textContent='Question '+(currentQIndex+1)+' of '+total;document.getElementById('xpBar').style.width=(currentQIndex/total*100)+'%';document.getElementById('scoreDisplay').textContent=score;document.getElementById('qTypeBadge').innerHTML=q.type==='mcq'?'<span class="badge badge-teal">⚡ Multiple Choice — HOTS</span>':'<span class="badge badge-gold">🔵 True or False</span>';document.getElementById('qText').textContent=q.text;const area=document.getElementById('optionsArea');if(q.type==='mcq'){const sh=shuffle(q.options.map((o,i)=>({text:o,orig:i})));area.innerHTML='<div class="options">'+sh.map((o,i)=>'<button class="opt" onclick="selectMCQ(this,'+o.orig+','+q.answer+')"><strong>'+String.fromCharCode(65+i)+'.</strong> '+escHtml(o.text)+'</button>').join('')+'</div>';}else{area.innerHTML='<div class="tf-grid"><button class="tf-btn" id="tfT" onclick="selectTF(this,\\'True\\',\\''+q.answer+'\\')">✔ TRUE</button><button class="tf-btn" id="tfF" onclick="selectTF(this,\\'False\\',\\''+q.answer+'\\')">✘ FALSE</button></div>';}}
function showFB(ok,ans){const fb=document.getElementById('feedbackBar');fb.textContent=ok?'✅ Correct! Well done.':'❌ Incorrect. Answer: '+ans;fb.className='feedback-bar show '+(ok?'correct-fb':'wrong-fb');}
function selectMCQ(btn,chosen,correct){if(answered)return;answered=true;document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;b.style.pointerEvents='none';});if(chosen===correct){btn.classList.add('correct');score++;showFB(true,'');}else{btn.classList.add('wrong');document.querySelectorAll('.opt').forEach(b=>{if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes(','+correct+')'))b.classList.add('correct');});showFB(false,currentQuestions[currentQIndex].options[correct]);}document.getElementById('nextBtn').disabled=false;document.getElementById('scoreDisplay').textContent=score;}
function selectTF(btn,chosen,correct){if(answered)return;answered=true;document.querySelectorAll('.tf-btn').forEach(b=>{b.disabled=true;b.style.pointerEvents='none';});const ok=chosen===correct;if(ok){btn.style.borderColor='var(--green)';btn.style.background='rgba(16,185,129,.15)';btn.style.color='var(--green)';score++;}else{btn.style.borderColor='var(--red)';btn.style.background='rgba(239,68,68,.12)';btn.style.color='var(--red)';const cb=correct==='True'?document.getElementById('tfT'):document.getElementById('tfF');if(cb){cb.style.borderColor='var(--green)';cb.style.background='rgba(16,185,129,.15)';cb.style.color='var(--green)';}}showFB(ok,correct);document.getElementById('nextBtn').disabled=false;document.getElementById('scoreDisplay').textContent=score;}
function nextQuestion(){currentQIndex++;if(currentQIndex>=currentQuestions.length)finishQuest();else renderQuestion();}
function finishQuest(){clearInterval(timerInterval);removeAntiCheat();document.getElementById('tabOverlay').classList.remove('show');const el=Math.floor((Date.now()-quizStartTime)/1000),m=Math.floor(el/60),s=el%60;currentStudent.score=score;currentStudent.timeTaken=m+'m '+(s<10?'0'+s:s)+'s';currentStudent.violations=violations;currentStudent.finishTime=new Date().toLocaleString();const sv=JSON.parse(localStorage.getItem('pq_students')||'[]');sv.push(currentStudent);localStorage.setItem('pq_students',JSON.stringify(sv));const p=Math.round(score/30*100);document.getElementById('finalScore').textContent=score+'/30';document.getElementById('finalPct').textContent=p+'% Accuracy';document.getElementById('finalRank').textContent=getRank(p);document.getElementById('finalEmoji').textContent=p>=80?'🏆':p>=60?'⭐':p>=40?'💪':'🌱';document.getElementById('violSummaryFinal').innerHTML=violations.length?'<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:14px;padding:18px;"><p style="color:var(--red);font-weight:800;margin-bottom:8px;">⚠️ '+violations.length+' Violation(s) Recorded</p>'+violations.slice(0,5).map(v=>'<p style="font-size:12px;color:var(--muted);padding:3px 0;">'+escHtml(v)+'</p>').join('')+'</div>':'<div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:14px;text-align:center;"><p style="color:var(--green);font-weight:700;">✅ No violations — clean academic record!</p></div>';go('screen-final');}
function getRank(p){return p>=93?'🏆 Quest Champion — Outstanding':p>=83?'⭐ Physics Warrior — Excellent':p>=73?'🔬 Light Scholar — Very Satisfactory':p>=60?'📚 Apprentice — Satisfactory':p>=50?'🛡 Explorer — Needs Improvement':'🌱 Keep Going!';}
function startAntiCheat(){document.body.style.userSelect='none';acHandlers.vis=()=>{if(document.hidden&&document.getElementById('screen-quiz').classList.contains('active')){logV('Tab switch detected');document.getElementById('tabOverlay').classList.add('show');document.getElementById('tabViolMsg').textContent='Violation #'+violations.length+' logged at Q'+(currentQIndex+1)+'.';}};document.addEventListener('visibilitychange',acHandlers.vis);acHandlers.copy=e=>{if(document.getElementById('screen-quiz').classList.contains('active')){e.preventDefault();logV('Copy attempted');}};document.addEventListener('copy',acHandlers.copy);acHandlers.paste=e=>{if(document.getElementById('screen-quiz').classList.contains('active')){e.preventDefault();logV('Paste attempted');}};document.addEventListener('paste',acHandlers.paste);acHandlers.ctx=e=>{if(document.getElementById('screen-quiz').classList.contains('active')){e.preventDefault();logV('Right-click attempted');}};document.addEventListener('contextmenu',acHandlers.ctx);acHandlers.key=e=>{if(!document.getElementById('screen-quiz').classList.contains('active'))return;if(e.key==='PrintScreen')logV('PrintScreen pressed');if((e.ctrlKey||e.metaKey)&&e.key==='p'){e.preventDefault();logV('Print shortcut attempted');}if(e.key==='F12'){e.preventDefault();logV('F12 pressed');}};document.addEventListener('keydown',acHandlers.key);acHandlers.blur=()=>{if(document.getElementById('screen-quiz').classList.contains('active'))logV('Window focus lost');};window.addEventListener('blur',acHandlers.blur);}
function removeAntiCheat(){document.body.style.userSelect='';document.removeEventListener('visibilitychange',acHandlers.vis);document.removeEventListener('copy',acHandlers.copy);document.removeEventListener('paste',acHandlers.paste);document.removeEventListener('contextmenu',acHandlers.ctx);document.removeEventListener('keydown',acHandlers.key);window.removeEventListener('blur',acHandlers.blur);}
function logV(msg){const ts=new Date().toLocaleTimeString(),e='['+ts+'] Q'+(currentQIndex+1)+': '+msg;violations.push(e);document.getElementById('vText').textContent='🚨 '+msg;document.getElementById('vCount').textContent='Violations: '+violations.length;document.getElementById('violBadge').textContent=violations.length;const b=document.getElementById('vBanner');b.classList.add('show');clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('show'),3500);}
function resumeFromTab(){document.getElementById('tabOverlay').classList.remove('show');}
<\\/script>

</html>`;

function downloadFile() {
  const blob = new Blob([CODE], { type: 'text/html;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function copyCode() {
  navigator.clipboard.writeText(CODE).then(() => {
    document.getElementById('copyMsg').style.display = 'block';
    setTimeout(() => document.getElementById('copyMsg').style.display = 'none', 3000);
  }).catch(() => {
    alert('Please use the Download button instead.');
  });
}
